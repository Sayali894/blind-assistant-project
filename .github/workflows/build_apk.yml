name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Download YOLOv8n TFLite model (pre-built)
        run: |
          mkdir -p assets
          curl -L "https://github.com/ultralytics/assets/releases/download/v8.4.0/yolov8n_float32.tflite" \
            -o assets/yolov8n.tflite
          echo "Model size: $(du -sh assets/yolov8n.tflite)"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/app-release.apk
