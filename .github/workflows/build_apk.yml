name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Download YOLOv8n TFLite model and create labels
        run: |
          mkdir -p assets/models
          curl -L "https://github.com/ultralytics/assets/releases/download/v8.4.0/yolov8n_float32.tflite" \
            -o assets/models/yolov8n.tflite
          echo "Model size: $(du -sh assets/models/yolov8n.tflite)"
          cat > assets/models/labels.txt << 'LABELS_EOF'
          person
          bicycle
          car
          motorcycle
          airplane
          bus
          train
          truck
          boat
          traffic light
          fire hydrant
          stop sign
          parking meter
          bench
          bird
          cat
          dog
          horse
          sheep
          cow
          elephant
          bear
          zebra
          giraffe
          backpack
          umbrella
          handbag
          tie
          suitcase
          frisbee
          skis
          snowboard
          sports ball
          kite
          baseball bat
          baseball glove
          skateboard
          surfboard
          tennis racket
          bottle
          wine glass
          cup
          fork
          knife
          spoon
          bowl
          banana
          apple
          sandwich
          orange
          broccoli
          carrot
          hot dog
          pizza
          donut
          cake
          chair
          couch
          potted plant
          bed
          dining table
          toilet
          tv
          laptop
          mouse
          remote
          keyboard
          cell phone
          microwave
          oven
          toaster
          sink
          refrigerator
          book
          clock
          vase
          scissors
          teddy bear
          hair drier
          toothbrush
          LABELS_EOF

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Patch flutter_vision namespace (AGP 8 fix)
        run: |
          FLUTTER_VISION_DIR=$(find $HOME/.pub-cache -type d -name "flutter_vision*" 2>/dev/null | head -1)
          echo "Found: $FLUTTER_VISION_DIR"
          if [ -n "$FLUTTER_VISION_DIR" ]; then
            BUILD_GRADLE="$FLUTTER_VISION_DIR/android/build.gradle"
            if ! grep -q "namespace" "$BUILD_GRADLE"; then
              sed -i 's/^android {/android {\n    namespace "com.hvt.flutter_vision"/' "$BUILD_GRADLE"
              echo "Patched successfully"
              cat "$BUILD_GRADLE"
            else
              echo "Already has namespace"
            fi
          fi

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/app-release.apk
