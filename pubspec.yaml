name: blind_assistant
description: Smart Assistant System for Visually Impaired People
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0
google_mlkit_text_recognition: ^0.13.0
google_mlkit_object_detection: ^0.13.0
  image: ^4.1.7
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  vibration: ^1.8.4
  http: ^1.1.0
  flutter_vision: ^1.0.3
  wakelock_plus: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
